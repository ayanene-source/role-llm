server:
  port: 8080

spring:
  application:
    name: role-llm-backend

llm:
  base-url: ${LLM_BASE_URL:https://api.deepseek.com}
  api-key: ${LLM_API_KEY}
  model: ${LLM_MODEL:deepseek-v4-flash}
  temperature: ${LLM_TEMPERATURE:0.7}

tts:
  enabled: ${TTS_ENABLED:false}
  base-url: ${TTS_BASE_URL:http://127.0.0.1:9880}
  text-lang: ${TTS_TEXT_LANG:zh}
  prompt-lang: ${TTS_PROMPT_LANG:ja}
  media-type: ${TTS_MEDIA_TYPE:wav}
  streaming-mode: ${TTS_STREAMING_MODE:false}
  ref-audio-path: ${TTS_REF_AUDIO_PATH:}
  prompt-text: ${TTS_PROMPT_TEXT:}
  gpt-weights-path: ${TTS_GPT_WEIGHTS_PATH:}
  sovits-weights-path: ${TTS_SOVITS_WEIGHTS_PATH:}
  text-split-method: ${TTS_TEXT_SPLIT_METHOD:cut4}
  speed-factor: ${TTS_SPEED_FACTOR:1.0}
  top-k: ${TTS_TOP_K:15}
  top-p: ${TTS_TOP_P:1.0}
  temperature: ${TTS_TEMPERATURE:1.0}
  fragment-interval: ${TTS_FRAGMENT_INTERVAL:0.3}
  output-dir: ${TTS_OUTPUT_DIR:data/audio}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    root: INFO
    com.rolellm: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-no-request}] %logger{36} - %msg%n"
